services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mgcssdb
      POSTGRES_USER: mgcss
      POSTGRES_PASSWORD: mgcss123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/mgcssdb
      DB_USERNAME: mgcss
      DB_PASSWORD: mgcss123
    depends_on:
      - db

volumes:
  pgdata:
